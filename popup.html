<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScrollBrake</title>
    <script src="ui-theme.js"></script>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="popup-page">
    <main class="app-shell popup-shell">
      <header class="popup-header">
        <div class="popup-header-row">
          <p class="eyebrow">ScrollBrake</p>
          <div class="hero-chip" id="active-site-chip">No tracked site open</div>
        </div>
        <h1>Control your scroll</h1>
        <p class="lede">Set a budget and reset timer for each tracked site.</p>
      </header>

      <section class="panel popup-section popup-section-limits">
        <div class="panel-heading popup-heading">
          <div>
            <h2>Session Limits</h2>
            <p>Applied separately to each enabled site.</p>
          </div>
        </div>
        <form id="settings-form" class="settings-grid popup-settings-grid">
          <label class="field popup-stat-field">
            <span>Usage limit</span>
            <div class="input-with-suffix">
              <input id="max-usage-minutes" name="maxUsageMinutes" type="number" min="1" step="1" required />
              <span>min</span>
            </div>
          </label>
          <label class="field popup-stat-field">
            <span>Lockout</span>
            <div class="input-with-suffix">
              <input id="block-duration-minutes" name="blockDurationMinutes" type="number" min="1" step="1" required />
              <span>min</span>
            </div>
          </label>
        </form>
      </section>

      <section class="panel popup-section popup-section-sites">
        <div class="panel-heading popup-heading">
          <div>
            <h2>Tracked Sites</h2>
            <p>Toggle defaults or add a custom domain below.</p>
          </div>
        </div>
        <div id="site-list" class="site-list"></div>
        <form id="custom-site-form" class="custom-site-form popup-custom-site-form">
          <label class="field field-grow popup-inline-field">
            <span>Add domain</span>
            <input id="custom-site-domain" type="text" placeholder="example.com" autocomplete="off" />
          </label>
          <button class="secondary-button" type="submit">Add</button>
        </form>
      </section>

      <footer class="app-footer popup-footer">
        <button id="save-button" class="primary-button" type="button">Save changes</button>
        <button id="open-options-button" class="text-button" type="button">Open full page</button>
      </footer>

      <p id="status-message" class="status-message" aria-live="polite"></p>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
