<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScrollBrake</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="popup-page">
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">ScrollBrake</p>
          <h1>Brake the scroll.</h1>
          <p class="lede">Quick limits, timed breaks, local-only data.</p>
        </div>
        <div class="hero-chip" id="active-site-chip">No tracked site open</div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <div>
            <h2>Limits</h2>
            <p>Applies independently to each enabled site.</p>
          </div>
        </div>
        <form id="settings-form" class="settings-grid">
          <label class="field">
            <span>Usage limit</span>
            <div class="input-with-suffix">
              <input id="max-usage-minutes" name="maxUsageMinutes" type="number" min="1" step="1" required />
              <span>min</span>
            </div>
          </label>
          <label class="field">
            <span>Lockout time</span>
            <div class="input-with-suffix">
              <input id="block-duration-minutes" name="blockDurationMinutes" type="number" min="1" step="1" required />
              <span>min</span>
            </div>
          </label>
        </form>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <div>
            <h2>Tracked sites</h2>
            <p>Built-ins plus your own domains.</p>
          </div>
        </div>
        <div id="site-list" class="site-list"></div>
        <form id="custom-site-form" class="custom-site-form">
          <label class="field field-grow">
            <span>Add domain</span>
            <input id="custom-site-domain" type="text" placeholder="example.com" autocomplete="off" />
          </label>
          <button class="secondary-button" type="submit">Add</button>
        </form>
      </section>

      <footer class="app-footer">
        <button id="save-button" class="primary-button" type="button">Save changes</button>
        <button id="open-options-button" class="text-button" type="button">Open full page</button>
      </footer>

      <p id="status-message" class="status-message" aria-live="polite"></p>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
